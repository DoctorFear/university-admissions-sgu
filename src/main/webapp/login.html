<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Score Portal</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>CỔNG THÔNG TIN</h1>
            <p>Kết quả xét tuyển Đại học Sài Gòn</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="studentId">CCCD</label>
                <input type="text" id="studentId" name="studentId" placeholder="Nhập căn cước công dân" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="show-password-container">
                <input type="checkbox" id="showPassword">
                <label for="showPassword">Hiển thị mật khẩu</label>
            </div>
            
            <div class="error-text" id="error">Thông tin đăng nhập không chính xác</div>

            <button type="submit">Đăng nhập</button>
        </form>

        <div class="footer-text">
            Gặp vấn đề? <a href="#" style="text-decoration: underline;">Liên hệ tại đây</a>
        </div>
    </div>
</body>
</html>
