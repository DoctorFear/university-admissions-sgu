<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Score Portal</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Student Score Portal</h1>
            <p>University Entrance Examination Results</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="studentId">Candidate Number</label>
                <input type="text" id="studentId" name="studentId" placeholder="Enter your candidate number" required>
            </div>

            <div class="form-group">
                <label for="password">Date of Birth / Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Log In</button>
        </form>

        <div class="footer-text">
            Need help? <a href="#">Contact support</a>
        </div>
    </div>
</body>
</html>
